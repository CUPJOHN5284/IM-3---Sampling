<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eras Tour Sampling Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@sgratzl/chartjs-chart-boxplot@3.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; color: #333; }
        .stage { background: #1a1a1a; color: #fff; padding: 12px; width: 520px; margin: 0 auto 15px; border-radius: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 6px; justify-content: center; margin: 20px auto; max-width: fit-content; }
        .seat { width: 50px; height: 50px; border: 1px solid #bdc3c7; display: flex; align-items: center; justify-content: center; background: #fff; font-size: 14px; border-radius: 4px; transition: 0.2s; }
        .selected { background-color: #f1c40f !important; font-weight: bold; border-color: #f39c12; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .controls { margin-bottom: 25px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 18px; cursor: pointer; border: none; background: #3498db; color: white; border-radius: 5px; font-weight: 600; }
        .run-all-btn { background: #27ae60; font-size: 1.1em; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .reset-btn { background: #e74c3c; }
        .chart-container { width: 95%; max-width: 1000px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #f8f9fa; font-size: 0.9em; }
        .hint { color: #7f8c8d; font-size: 0.85em; margin-top: 20px; border-top: 1px solid #ecf0f1; padding-top: 15px; }
        kbd { background: #eee; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-weight: bold; }
        canvas { max-height: 350px; }
    </style>
</head>
<body>

    <h2>🎤 Eras Tour: Sampling Simulator</h2>
    <div class="stage">STAGE</div>
    <div id="seating-grid" class="grid"></div>

    <div class="controls">
        <button class="run-all-btn" onclick="runAllMethods()">🚀 Run All Methods Simultaneously</button>
        <div style="width:100%"></div>
        <button onclick="runSample('SRS')">Take SRS</button>
        <button onclick="runSample('StratRow')">Strat (Row)</button>
        <button onclick="runSample('StratCol')">Strat (Col)</button>
        <button onclick="runSample('ClusterRow')">Cluster (Row)</button>
        <button onclick="runSample('ClusterCol')">Cluster (Col)</button>
        <button onclick="runSample('Systematic')">Systematic</button>
        <button class="reset-btn" onclick="resetAll()">Reset All</button>
    </div>

    <div class="chart-container">
        <h3>Cumulative Distribution of Sample Means</h3>
        <div style="height: 350px;"><canvas id="boxPlotCanvas"></canvas></div>

        <h3>Sampling Statistics</h3>
        <table>
            <thead>
                <tr>
                    <th>Method</th>
                    <th>Samples</th>
                    <th>Q1 (25%)</th>
                    <th>Q3 (75%)</th>
                    <th style="color:#e74c3c">IQR</th>
                    <th style="background:#fef9e7">Running Mean</th>
                </tr>
            </thead>
            <tbody id="statsBody"></tbody>
        </table>
        
        <div class="hint">
            <strong>Hotkeys:</strong> <kbd>Alt</kbd> + <kbd>U</kbd> Reveal All Grid Scores | <kbd>Alt</kbd> + <kbd>A</kbd> Toggle True Mean (μ = 78.18)
        </div>
    </div>

    <script>
        const scores = [
            92, 89, 90, 88, 95, 100, 98, 93, 95, 84, 
            82, 86, 90, 88, 86, 91, 90, 89, 85, 83, 
            80, 74, 80, 67, 81, 82, 76, 77, 74, 65, 
            72, 68, 74, 73, 70, 69, 72, 70, 68, 67, 
            69, 67, 68, 68, 64, 66, 63, 63, 70, 68
        ];

        const trueMean = 78.18;
        const labels = ['SRS', 'StratRow', 'StratCol', 'ClusterRow', 'ClusterCol', 'Systematic'];
        const displayLabels = ['SRS', 'Strat (Row)', 'Strat (Col)', 'Clust (Row)', 'Clust (Col)', 'Systematic'];
        let history = { SRS: [], StratRow: [], StratCol: [], ClusterRow: [], ClusterCol: [], Systematic: [] };
        
        let revealGrid = false;
        let showMeanLine = false;
        let boxChart;

        function createGrid() {
            const grid = document.getElementById('seating-grid');
            grid.innerHTML = '';
            scores.forEach((score, index) => {
                const div = document.createElement('div');
                div.className = 'seat';
                div.id = `seat-${index}`;
                div.innerText = revealGrid ? score : "?";
                div.style.color = revealGrid ? "#2c3e50" : "#bdc3c7";
                grid.appendChild(div);
            });
        }

        const gen = {
            SRS: () => { let r = []; while(r.length < 10){ let s = Math.floor(Math.random()*50); if(!r.includes(s)) r.push(s); } return r; },
            StratRow: () => { let r = []; for(let i=0; i<5; i++){ let row=[]; while(row.length<2){ let s=Math.floor(Math.random()*10)+(i*10); if(!row.includes(s)) row.push(s); } r.push(...row); } return r; },
            StratCol: () => { let r = []; for(let i=0; i<10; i++){ r.push(Math.floor(Math.random()*5)*10+i); } return r; },
            ClusterRow: () => { let row = Math.floor(Math.random()*5); return Array.from({length:10}, (_,i)=>row*10+i); },
            ClusterCol: () => { let c1 = Math.floor(Math.random()*10); let c2; do { c2 = Math.floor(Math.random()*10); } while(c1===c2); let r=[]; for(let i=0; i<5; i++){ r.push(i*10+c1, i*10+c2); } return r; },
            Systematic: () => { let start = Math.floor(Math.random()*5); return Array.from({length:10}, (_,i)=>(start+i*5)%50); }
        };

        function getQuartile(data, q) {
            if (data.length === 0) return 0;
            const sorted = [...data].sort((a, b) => a - b);
            const pos = (sorted.length - 1) * q;
            const base = Math.floor(pos);
            const rest = pos - base;
            return sorted[base + 1] !== undefined ? sorted[base] + rest * (sorted[base + 1] - sorted[base]) : sorted[base];
        }

        function runSample(type, silent = false) {
            const indices = gen[type]();
            const avg = indices.reduce((sum, idx) => sum + scores[idx], 0) / 10;
            history[type].push(avg);
            
            if (!silent) {
                createGrid();
                indices.forEach(idx => {
                    const seat = document.getElementById(`seat-${idx}`);
                    if(seat) {
                        seat.classList.add('selected');
                        seat.innerText = scores[idx];
                        seat.style.color = "#2c3e50";
                    }
                });
            }
            updateChart();
            updateTable();
        }

        function runAllMethods() {
            labels.forEach(type => runSample(type, true));
            createGrid(); 
            updateChart();
            updateTable();
        }

        function updateTable() {
            const body = document.getElementById('statsBody');
            body.innerHTML = '';
            labels.forEach((id, index) => {
                const data = history[id];
                const q1 = getQuartile(data, 0.25);
                const q3 = getQuartile(data, 0.75);
                const avg = data.length > 0 ? (data.reduce((a,b)=>a+b,0)/data.length).toFixed(2) : "-";
                
                body.innerHTML += `<tr>
                    <td>${displayLabels[index]}</td>
                    <td>${data.length}</td>
                    <td>${data.length ? q1.toFixed(2) : "-"}</td>
                    <td>${data.length ? q3.toFixed(2) : "-"}</td>
                    <td style="font-weight:bold">${data.length ? (q3-q1).toFixed(2) : "-"}</td>
                    <td style="background:#fef9e7">${avg}</td>
                </tr>`;
            });
        }

        function initChart() {
            const canvas = document.getElementById('boxPlotCanvas');
            if (!canvas || typeof Chart === 'undefined') return;
            boxChart = new Chart(canvas.getContext('2d'), {
                type: 'boxplot',
                data: {
                    labels: displayLabels,
                    datasets: [{ label: 'Sample Means (n=10)', backgroundColor: 'rgba(52, 152, 219, 0.5)', borderColor: '#2980b9', data: [] }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { y: { min: 60, max: 100 } },
                    plugins: { annotation: { annotations: {} } }
                }
            });
        }

        function updateChart() {
            if (!boxChart) return;
            boxChart.data.datasets[0].data = labels.map(id => history[id]);
            
            const line = showMeanLine ? {
                type: 'line', yMin: trueMean, yMax: trueMean, borderColor: '#e74c3c', borderWidth: 3, borderDash: [6, 6],
                label: { display: true, content: `μ: ${trueMean}`, position: 'end', backgroundColor: '#e74c3c', color: '#fff' }
            } : null;

            boxChart.options.plugins.annotation.annotations = line ? { line1: line } : {};
            boxChart.update();
        }

        function resetAll() {
            Object.keys(history).forEach(k => history[k] = []);
            createGrid();
            updateChart();
            updateTable();
        }

        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 'u') { 
                e.preventDefault(); revealGrid = !revealGrid; createGrid(); 
            }
            if (e.altKey && e.key.toLowerCase() === 'a') { 
                e.preventDefault(); showMeanLine = !showMeanLine; updateChart(); 
            }
        });

        window.onload = () => { createGrid(); initChart(); updateTable(); };
    </script>
</body>
</html>
